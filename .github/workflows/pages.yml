name: Deploy the privacy-safe shell

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the shell
        uses: actions/checkout@v7

      - name: Build an allow-listed Pages artifact
        run: |
          install -d _site/assets
          cp index.html bootstrap.js styles.css app.js core.js pdf.js demo-data.js manifest.webmanifest sw.js jobs.json _site/
          cp assets/garden-mark.svg assets/garden-mark-192.png assets/garden-mark-512.png assets/garden-companions.jpg assets/pdf-lib.min.js _site/assets/
          cp index.html _site/404.html
          touch _site/.nojekyll

      - name: Confirm the shell contains no private backend
        run: |
          test ! -e _site/_backend
          test ! -e _site/Code.gs
          if grep -R -E -i --exclude='pdf-lib.min.js' "mailto:|tel:|[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}|linkedin\.com/in/|\+44[[:space:]-]*[0-9]" _site; then
            echo "Contact or profile data found in the Pages artifact."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
