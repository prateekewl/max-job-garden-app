<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="theme-color" content="#173f2c">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://script.google.com https://script.googleusercontent.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; font-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'"
    >
    <title>Max's Job Garden</title>
    <meta name="description" content="A focused, practical job-search workspace built for Max.">
    <script src="./bootstrap.js?v=20260720-13"></script>
    <link rel="manifest" href="./manifest.webmanifest?v=20260720-7">
    <link rel="icon" href="./assets/garden-mark.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="192x192" href="./assets/garden-mark-192.png">
    <link rel="stylesheet" href="./styles.css?v=20260720-13">
  </head>
  <body>
    <a class="skip-link" href="#viewContent">Skip to the workspace</a>

    <div id="accessGate" hidden></div>

    <div class="app-frame" id="appRoot">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="sidebar-top">
          <button class="brand-lockup brand-button" type="button" data-view="today" aria-label="Go to Today">
            <span class="brand-mark"><svg aria-hidden="true"><use href="#icon-sprout"></use></svg></span>
            <span>Job Garden</span>
          </button>
          <nav class="side-nav" aria-label="Workspace">
            <button class="nav-link active" type="button" data-view="today">
              <svg aria-hidden="true"><use href="#icon-home"></use></svg>
              <span>Today</span>
              <span class="nav-count" id="todayNavCount" hidden></span>
            </button>
            <button class="nav-link" type="button" data-view="discover">
              <svg aria-hidden="true"><use href="#icon-search"></use></svg>
              <span>Discover</span>
              <span class="nav-count" id="discoverNavCount" hidden></span>
            </button>
            <button class="nav-link" type="button" data-view="pipeline">
              <svg aria-hidden="true"><use href="#icon-columns"></use></svg>
              <span>Pipeline</span>
            </button>
            <button class="nav-link" type="button" data-view="progress">
              <svg aria-hidden="true"><use href="#icon-chart"></use></svg>
              <span>Progress</span>
            </button>
            <button class="nav-link" type="button" data-view="cv">
              <svg aria-hidden="true"><use href="#icon-file"></use></svg>
              <span>CV &amp; messages</span>
            </button>
          </nav>
        </div>

        <div class="sidebar-bottom">
          <button class="scout-mini-card" id="scoutMiniCard" type="button" data-view="settings">
            <span class="scout-orbit"><span></span></span>
            <span>
              <strong>Scout is checking</strong>
              <small id="scoutMiniText">Connecting…</small>
            </span>
          </button>
          <button class="nav-link" type="button" data-view="settings">
            <svg aria-hidden="true"><use href="#icon-settings"></use></svg>
            <span>Settings</span>
          </button>
          <button class="person-card" id="personMenu" type="button" aria-label="Account and privacy">
            <span class="avatar" id="personAvatar">M</span>
            <span><strong id="personName">Max</strong><small id="personRole">Candidate</small></span>
            <svg aria-hidden="true"><use href="#icon-chevron"></use></svg>
          </button>
        </div>
      </aside>

      <header class="topbar">
        <button class="mobile-brand" type="button" data-view="today" aria-label="Go to Today">
          <span class="brand-mark"><svg aria-hidden="true"><use href="#icon-sprout"></use></svg></span>
          <span>Job Garden</span>
        </button>
        <div class="topbar-title">
          <p class="eyebrow" id="viewEyebrow">Your focus</p>
          <h1 id="viewTitle">Today</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="refreshData" type="button" aria-label="Refresh jobs" title="Refresh jobs">
            <svg aria-hidden="true"><use href="#icon-refresh"></use></svg>
          </button>
          <button class="icon-button notification-button" id="notificationButton" type="button" aria-label="Notification settings" title="Notification settings">
            <svg aria-hidden="true"><use href="#icon-bell"></use></svg>
            <span class="notification-dot" id="notificationDot" hidden></span>
          </button>
          <button class="button primary quick-add" id="openAddJob" type="button">
            <svg aria-hidden="true"><use href="#icon-plus"></use></svg>
            <span>Add job</span>
          </button>
        </div>
      </header>

      <div class="connection-banner" id="connectionBanner" role="status" hidden></div>
      <main class="view-content" id="viewContent" tabindex="-1" aria-labelledby="viewTitle"></main>

      <nav class="mobile-nav" aria-label="Mobile navigation">
        <button class="mobile-nav-link active" type="button" data-view="today"><svg aria-hidden="true"><use href="#icon-home"></use></svg><span>Today</span></button>
        <button class="mobile-nav-link" type="button" data-view="discover"><svg aria-hidden="true"><use href="#icon-search"></use></svg><span>Discover</span></button>
        <button class="mobile-nav-link mobile-add" id="mobileAddJob" type="button" aria-label="Add a job"><svg aria-hidden="true"><use href="#icon-plus"></use></svg></button>
        <button class="mobile-nav-link" type="button" data-view="pipeline"><svg aria-hidden="true"><use href="#icon-columns"></use></svg><span>Pipeline</span></button>
        <button class="mobile-nav-link" type="button" data-view="progress"><svg aria-hidden="true"><use href="#icon-chart"></use></svg><span>Progress</span></button>
      </nav>
    </div>

    <dialog class="job-dialog" id="jobDialog" aria-labelledby="jobDialogTitle">
      <div id="jobDialogContent"></div>
    </dialog>

    <dialog class="form-dialog" id="addJobDialog" aria-labelledby="addJobTitle">
      <form class="dialog-form" id="addJobForm" method="dialog">
        <div class="dialog-heading">
          <div>
            <p class="eyebrow">Add to the garden</p>
            <h2 id="addJobTitle">Save a job in under a minute</h2>
            <p>Paste the essentials now. You can add detail after the quick decision.</p>
          </div>
          <button class="icon-button" type="button" data-close-dialog="addJobDialog" aria-label="Close"><svg aria-hidden="true"><use href="#icon-close"></use></svg></button>
        </div>
        <label class="field full"><span>Job advert link</span><input name="url" type="url" inputmode="url" placeholder="https://…" autocomplete="url"></label>
        <div class="field-grid">
          <label class="field"><span>Role title</span><input name="title" type="text" required placeholder="Service Delivery Manager" autocomplete="off"></label>
          <label class="field"><span>Company</span><input name="company" type="text" required placeholder="Company name" autocomplete="organization"></label>
          <label class="field"><span>Location</span><input name="location" type="text" placeholder="Glasgow · Hybrid" autocomplete="off"></label>
          <label class="field"><span>Work pattern</span><select name="workPattern"><option value="unknown">Not sure yet</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="onsite">On-site</option></select></label>
          <label class="field"><span>Salary from</span><input name="salaryMin" type="number" min="0" step="1000" inputmode="numeric" placeholder="40000"></label>
          <label class="field"><span>Salary to</span><input name="salaryMax" type="number" min="0" step="1000" inputmode="numeric" placeholder="50000"></label>
          <label class="field"><span>Posted date</span><input name="postedDate" type="date"></label>
          <label class="field"><span>Application deadline</span><input name="deadline" type="date"></label>
        </div>
        <label class="field full"><span>Advert notes or description</span><textarea name="description" rows="5" placeholder="Paste the important responsibilities, must-haves, benefits, or concerns."></textarea></label>
        <div class="dialog-footer">
          <button class="button quiet" type="button" data-close-dialog="addJobDialog">Cancel</button>
          <button class="button primary" type="submit"><svg aria-hidden="true"><use href="#icon-plus"></use></svg>Add to Discover</button>
        </div>
      </form>
    </dialog>

    <dialog class="small-dialog" id="accountDialog" aria-labelledby="accountDialogTitle">
      <div class="account-dialog-content">
        <div class="dialog-heading compact">
          <div><p class="eyebrow">Your workspace</p><h2 id="accountDialogTitle">This device</h2></div>
          <button class="icon-button" type="button" data-close-dialog="accountDialog" aria-label="Close"><svg aria-hidden="true"><use href="#icon-close"></use></svg></button>
        </div>
        <p id="accountSummary">Your jobs and settings are saved on this device.</p>
        <button class="button danger full-button" id="lockDevice" type="button"><svg aria-hidden="true"><use href="#icon-trash"></use></svg>Reset this device</button>
      </div>
    </dialog>

    <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

    <svg class="svg-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-sprout" viewBox="0 0 24 24"><path d="M7 20h10M12 20v-9M12 11C8 11 5 8 5 4c4 0 7 3 7 7Zm0 4c0-4 3-7 7-7 0 4-3 7-7 7Z" /></symbol>
      <symbol id="icon-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1v-9Z" /></symbol>
      <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4" /></symbol>
      <symbol id="icon-columns" viewBox="0 0 24 24"><rect x="3" y="4" width="7" height="16" rx="2"/><rect x="14" y="4" width="7" height="10" rx="2"/></symbol>
      <symbol id="icon-chart" viewBox="0 0 24 24"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2" /></symbol>
      <symbol id="icon-file" viewBox="0 0 24 24"><path d="M6 2h8l4 4v16H6zM14 2v5h5M9 12h6m-6 4h6" /></symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21h-4v-.09A1.7 1.7 0 0 0 9 19.35a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3v-4h.09A1.7 1.7 0 0 0 4.65 9a1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6 1.7 1.7 0 0 0 10 3.05V3h4v.09A1.7 1.7 0 0 0 15 4.65a1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9c.24.62.85 1.03 1.51 1.03H21v4h-.09A1.7 1.7 0 0 0 19.4 15Z" /></symbol>
      <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2 5.3M20 4v7h-7" /></symbol>
      <symbol id="icon-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9ZM10 21h4" /></symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></symbol>
      <symbol id="icon-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18" /></symbol>
      <symbol id="icon-lock" viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3" /></symbol>
      <symbol id="icon-arrow" viewBox="0 0 24 24"><path d="M5 12h14m-6-6 6 6-6 6" /></symbol>
      <symbol id="icon-external" viewBox="0 0 24 24"><path d="M14 4h6v6m0-6-9 9M20 14v6H4V4h6" /></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path d="m4 12 5 5L20 6" /></symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" /></symbol>
      <symbol id="icon-map" viewBox="0 0 24 24"><path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2.5"/></symbol>
      <symbol id="icon-money" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 12h10M12 8v8" /></symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4m8-4v4M3 10h18" /></symbol>
      <symbol id="icon-sparkles" viewBox="0 0 24 24"><path d="m12 3 1.2 3.8L17 8l-3.8 1.2L12 13l-1.2-3.8L7 8l3.8-1.2L12 3Zm6 10 .8 2.2L21 16l-2.2.8L18 19l-.8-2.2L15 16l2.2-.8L18 13ZM6 14l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3Z" /></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12m-5-5 5 5 5-5M4 20h16" /></symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V4H4v12h4" /></symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24"><path d="m4 16-1 5 5-1L20 8l-4-4L4 16Z"/><path d="m14 6 4 4" /></symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M4 7h16m-10 4v6m4-6v6M6 7l1 14h10l1-14M9 7V4h6v3" /></symbol>
      <symbol id="icon-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></symbol>
      <symbol id="icon-filter" viewBox="0 0 24 24"><path d="M4 5h16M7 12h10m-7 7h4" /></symbol>
      <symbol id="icon-inbox" viewBox="0 0 24 24"><path d="m4 5-2 12h6l2 3h4l2-3h6L20 5H4Z"/><path d="M2 17h6m8 0h6" /></symbol>
      <symbol id="icon-zap" viewBox="0 0 24 24"><path d="m13 2-9 12h8l-1 8 9-12h-8l1-8Z" /></symbol>
      <symbol id="icon-mail" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6" /></symbol>
      <symbol id="icon-phone" viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2A19.8 19.8 0 0 1 3 5.2 2 2 0 0 1 5 3h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.6a2 2 0 0 1-.5 2.1L9 10.6a16 16 0 0 0 4.4 4.4l1.2-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2Z" /></symbol>
      <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16" /></symbol>
    </svg>

    <script src="./assets/pdf-lib.min.js"></script>
    <script type="module" src="./app.js?v=20260720-14"></script>
  </body>
</html>
